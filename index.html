<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubus Matematik Ajaib 3D - Tahun 1</title>
    <!-- Google Fonts: Outfit for premium modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0c071e;
            --primary: #00f0ff;
            --secondary: #ff007f;
            --accent: #ffaa00;
            --success: #10b981;
            --danger: #ef4444;
            --text-light: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Outfit', sans-serif;
            color: var(--text-light);
        }

        /* Fullscreen canvas background */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Layer */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none; /* Let clicks pass through to canvas */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
        }

        /* Allow pointer events for interactive UI elements */
        .interactive-ui {
            pointer-events: auto;
        }

        /* Header design */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .logo-container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--primary);
            box-shadow: 0 0 10px var(--primary);
            animation: pulse 1.5s infinite alternate;
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 1px;
            background: linear-gradient(45deg, var(--primary), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Stats container and box design */
        .stats-container {
            display: flex;
            gap: 15px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 10px 22px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stat-label {
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.6);
        }

        .stat-val {
            font-weight: 900;
            font-size: 1.8rem;
            color: var(--accent);
            text-shadow: 0 0 15px rgba(255, 170, 0, 0.5);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Level Up Banner Overlay */
        .level-up-banner {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--accent);
            text-shadow: 0 0 30px rgba(255, 170, 0, 0.8), 0 0 10px rgba(255, 255, 255, 0.8);
            opacity: 0;
            pointer-events: none;
            z-index: 5;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 3px;
        }

        .level-up-active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.2);
        }

        /* Question Center Panel */
        .center-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -170%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 3;
            pointer-events: none;
            width: 90%;
            max-width: 450px;
        }

        .question-card {
            background: rgba(12, 7, 30, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px 40px;
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 100%;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .question-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
        }

        .question-title {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
        }

        .question-text {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
            animation: float-slow 4s ease-in-out infinite;
        }

        /* Feedback display */
        .feedback-text {
            font-size: 1.5rem;
            font-weight: 800;
            height: 35px;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: scale(0.8) translateY(10px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }

        .feedback-active {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .feedback-correct {
            color: var(--success);
            text-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        .feedback-incorrect {
            color: var(--danger);
            text-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        /* Footer info */
        footer {
            display: flex;
            justify-content: center;
            width: 100%;
            z-index: 3;
        }

        .instruction-box {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 12px 30px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
            max-width: 90%;
        }

        /* Start Overlay */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(12, 7, 30, 0.9) 0%, rgba(6, 3, 15, 0.98) 100%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: opacity 0.8s ease;
        }

        .overlay-content {
            text-align: center;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            animation: fadeInScale 0.6s ease-out;
        }

        .overlay-title {
            font-size: 2.8rem;
            font-weight: 900;
            line-height: 1.2;
            background: linear-gradient(135deg, var(--primary) 0%, #d8b4fe 50%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(0, 240, 255, 0.15);
        }

        .overlay-subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
        }

        .start-btn {
            background: linear-gradient(135deg, var(--primary), #a855f7);
            border: none;
            outline: none;
            color: var(--text-light);
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            font-weight: 800;
            padding: 16px 45px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.4);
            transition: all 0.3s ease;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .start-btn:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 0 35px rgba(0, 240, 255, 0.6), 0 0 15px rgba(168, 85, 247, 0.4);
        }

        .start-btn:active {
            transform: translateY(1px) scale(0.98);
        }

        /* Animations */
        @keyframes pulse {
            from {
                transform: scale(0.95);
                opacity: 0.8;
                box-shadow: 0 0 8px var(--primary);
            }
            to {
                transform: scale(1.1);
                opacity: 1;
                box-shadow: 0 0 15px var(--primary);
            }
        }

        @keyframes float-slow {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Small screen adjustments */
        @media (max-width: 600px) {
            .overlay-title {
                font-size: 2rem;
            }
            .question-text {
                font-size: 2.5rem;
            }
            .ui-layer {
                padding: 15px;
            }
            .logo-text {
                font-size: 0.9rem;
            }
            .stats-container {
                gap: 8px;
            }
            .stat-box {
                padding: 8px 14px;
                border-radius: 14px;
                gap: 8px;
            }
            .stat-val {
                font-size: 1.3rem;
            }
            .stat-label {
                font-size: 0.75rem;
            }
            .instruction-box {
                font-size: 0.8rem;
                padding: 10px 20px;
            }
            .level-up-banner {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- Overlay Skrin Permulaan -->
    <div id="start-overlay" class="overlay">
        <div class="overlay-content">
            <h1 class="overlay-title">KUBUS MATEMATIK<br>AJAIB 3D</h1>
            <p class="overlay-subtitle">Selamat datang pengembara bijak! Selesaikan cabaran matematik tambah dan tolak dengan memilih kubus ajaib yang betul.</p>
            <button id="btn-start" class="start-btn interactive-ui">MULAKAN KEMBARA</button>
        </div>
    </div>

    <!-- Container Utama untuk Grafik Three.js -->
    <div id="canvas-container"></div>

    <!-- Banner Naik Tahap -->
    <div id="level-up-banner" class="level-up-banner">TAHAP BARU!</div>

    <!-- Antaramuka Pengguna (UI) di atas WebGL Canvas -->
    <div class="ui-layer">
        <header>
            <div class="logo-container">
                <div class="logo-dot"></div>
                <div class="logo-text">MATEMATIK TAHUN 1</div>
            </div>
            <div class="stats-container interactive-ui">
                <div class="stat-box">
                    <span class="stat-label">Tahap</span>
                    <span id="level-val" class="stat-val">1</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Skor</span>
                    <span id="score-val" class="stat-val">0</span>
                </div>
            </div>
        </header>

        <div class="center-panel">
            <div class="question-card">
                <span class="question-title">Soalan</span>
                <span id="question-text" class="question-text">Sedia?</span>
            </div>
            <div id="feedback-text" class="feedback-text"></div>
        </div>

        <footer>
            <div class="instruction-box">
                Gunakan tetikus atau sentuh kubus dengan jawapan yang betul!
            </div>
        </footer>
    </div>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- KONFIGURASI SISTEM & KADAR ---
        let scene, camera, renderer;
        let cubes = [];
        let particles;
        let bottomLight; // Jadikan global untuk perubahan tema tahap
        const cubeBaseX = [-3.2, 0, 3.2];
        const cubeColors = ['#00f0ff', '#ff007f', '#ffaa00']; // Cyan, Pink, Orange
        const cubeTextColors = ['#0c071e', '#0c071e', '#0c071e'];

        // Logik Permainan
        let currentQuestion = { a: 0, b: 0, op: '+', answer: 0 };
        let choices = [0, 0, 0];
        let score = 0;
        let level = 1; // Tahap permainan semasa
        let canClick = false;
        let isMuted = false;

        // Tema warna mengikut Tahap
        const levelThemes = [
            { particleColor: 0x818cf8, bottomLight: 0x7c3aed }, // Level 1 (Indigo/Blue)
            { particleColor: 0xec4899, bottomLight: 0xdb2777 }, // Level 2 (Pink/Magenta)
            { particleColor: 0x10b981, bottomLight: 0x059669 }, // Level 3 (Emerald Green)
            { particleColor: 0xf59e0b, bottomLight: 0xd97706 }, // Level 4 (Amber/Orange)
            { particleColor: 0xef4444, bottomLight: 0xdc2626 }  // Level 5+ (Crimson/Red)
        ];
        
        // Raycasting
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // Audio Context
        let audioCtx = null;

        // UI DOM Elements
        const startOverlay = document.getElementById('start-overlay');
        const btnStart = document.getElementById('btn-start');
        const scoreVal = document.getElementById('score-val');
        const questionText = document.getElementById('question-text');
        const feedbackText = document.getElementById('feedback-text');

        // Mesej maklum balas rawak
        const positiveFeedbacks = ['Hebat!', 'Tahniah!', 'Bijak!', 'Betul!', 'Luar Biasa!', 'Cemerlang!'];
        const negativeFeedbacks = ['Cuba lagi!', 'Hampir tepat!', 'Teruskan usaha!', 'Jangan putus asa!'];

        // --- PENGAKTIFAN GAME & AUDIO ---
        btnStart.addEventListener('click', () => {
            // Aktifkan Audio Context
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Sembunyikan Overlay
            startOverlay.style.opacity = 0;
            setTimeout(() => {
                startOverlay.style.display = 'none';
                canClick = true;
                // Mula permainan & jana soalan pertama
                generateQuestion();
            }, 800);
        });

        // --- SISTEM AUDIO SINTETIK (Web Audio API) ---
        function playCorrectSound() {
            if (!audioCtx) return;
            
            const now = audioCtx.currentTime;
            
            // Bell / Chime 1 (B5 - 987.77 Hz)
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(987.77, now);
            gain1.gain.setValueAtTime(0.15, now);
            gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.6);
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            
            // Bell / Chime 2 (E6 - 1318.51 Hz) - bermula sedikit lambat untuk kesan arpeggio
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(1318.51, now + 0.08);
            gain2.gain.setValueAtTime(0.12, now + 0.08);
            gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.8);
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            
            osc1.start(now);
            osc1.stop(now + 0.7);
            
            osc2.start(now + 0.08);
            osc2.stop(now + 0.9);
        }

        function playIncorrectSound() {
            if (!audioCtx) return;

            const now = audioCtx.currentTime;
            
            // Low synth buzzer
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sawtooth';
            // Frekuensi gelongsor ke bawah (pitch slide)
            osc.frequency.setValueAtTime(130, now);
            osc.frequency.linearRampToValueAtTime(70, now + 0.35);
            
            gain.gain.setValueAtTime(0.18, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
            
            // Penapis LPF untuk melembutkan bunyi sawtooth
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(300, now);
            
            osc.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start(now);
            osc.stop(now + 0.4);
        }

        // --- SISTEM TEKSTUR 2D CANVAS KUBUS ---
        function createNumberTexture(text, bgColor, textColor) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');

            // Latar Belakang Gradient Lembut
            const grad = ctx.createRadialGradient(128, 128, 10, 128, 128, 180);
            grad.addColorStop(0, adjustBrightness(bgColor, 30));
            grad.addColorStop(1, bgColor);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 256, 256);

            // Bingkai Bersinar (Glow Border)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.lineWidth = 14;
            ctx.strokeRect(7, 7, 242, 242);

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 6;
            ctx.strokeRect(20, 20, 216, 216);

            // Lukis Teks Nombor
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 130px "Outfit", "Quicksand", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Bayang Teks untuk kontras
            ctx.shadowColor = 'rgba(0, 0, 0, 0.4)';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetX = 3;
            ctx.shadowOffsetY = 5;

            ctx.fillText(text.toString(), 128, 128);

            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace; // Tona warna Three.js moden
            return texture;
        }

        // Pembantu untuk mencerahkan warna
        function adjustBrightness(hex, percent) {
            let num = parseInt(hex.replace("#",""),16),
            amt = Math.round(2.55 * percent),
            R = (num >> 16) + amt,
            G = (num >> 8 & 0x00FF) + amt,
            B = (num & 0x0000FF) + amt;
            return "#" + (0x1000000 + (R<255?R<0?0:R:255)*0x10000 + (G<255?G<0?0:G:255)*0x100 + (B<255?B<0?0:B:255)).toString(16).slice(1);
        }

        // --- SISTEM GRAPHICS THREE.JS ---
        function init3D() {
            const container = document.getElementById('canvas-container');
            
            // Scene
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0c071e, 0.04);

            // Camera
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0, 8.5);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // Pencahayaan (Lighting)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            // Pencahayaan Utama dari Atas
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(0, 10, 5);
            scene.add(dirLight);

            // Pencahayaan Berwarna dari Bawah untuk visual dramatik
            bottomLight = new THREE.PointLight(0x7c3aed, 2, 15);
            bottomLight.position.set(0, -6, 2);
            scene.add(bottomLight);

            // Tambah Point Lights untuk setiap kubus bagi kesan glow setempat
            cubeColors.forEach((color, i) => {
                const pLight = new THREE.PointLight(color, 1.2, 5);
                pLight.position.set(cubeBaseX[i], 0, 1);
                scene.add(pLight);
            });

            // Sistem Zarah (Background Particles)
            createParticles();

            // Bina 3 Kubus
            createCubes();

            // Responsif pada resize pelayar
            window.addEventListener('resize', onWindowResize);
            
            // Pengesan Klik / Sentuh
            renderer.domElement.addEventListener('pointerdown', onPointerDown);
            renderer.domElement.addEventListener('pointermove', onPointerMove);

            // Animasi Loop
            animate();
        }

        function createParticles() {
            const count = 350;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const sizes = new Float32Array(count);

            for(let i = 0; i < count * 3; i += 3) {
                // Sebarkan zarah di kawasan yang luas
                positions[i] = (Math.random() - 0.5) * 20;
                positions[i+1] = (Math.random() - 0.5) * 15;
                positions[i+2] = (Math.random() - 0.5) * 10 - 2; // letak di belakang kubus
                
                sizes[i/3] = Math.random() * 2 + 1;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            // Reka bentuk Zarah yang bulat dan bercahaya menggunakan Canvas
            const pCanvas = document.createElement('canvas');
            pCanvas.width = 16;
            pCanvas.height = 16;
            const pCtx = pCanvas.getContext('2d');
            const pGrad = pCtx.createRadialGradient(8, 8, 0, 8, 8, 8);
            pGrad.addColorStop(0, 'rgba(255, 255, 255, 1)');
            pGrad.addColorStop(0.3, 'rgba(168, 85, 247, 0.8)');
            pGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            pCtx.fillStyle = pGrad;
            pCtx.fillRect(0, 0, 16, 16);
            
            const pTexture = new THREE.CanvasTexture(pCanvas);

            const material = new THREE.PointsMaterial({
                size: 0.15,
                map: pTexture,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                color: 0x818cf8
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        function createCubes() {
            const geometry = new THREE.BoxGeometry(1.6, 1.6, 1.6);

            for (let i = 0; i < 3; i++) {
                // Tekstur awal sementara
                const texture = createNumberTexture("?", cubeColors[i], cubeTextColors[i]);
                
                const material = new THREE.MeshStandardMaterial({
                    map: texture,
                    roughness: 0.15,
                    metalness: 0.25,
                    bumpScale: 0.05
                });

                const cube = new THREE.Mesh(geometry, material);
                cube.position.set(cubeBaseX[i], 0, 0);
                
                // Menyimpan data penting
                cube.userData = {
                    index: i,
                    value: null,
                    targetScale: 1.0,
                    baseY: 0,
                    rotationSpeedX: 0.008 + (i * 0.002),
                    rotationSpeedY: 0.012 - (i * 0.001)
                };

                scene.add(cube);
                cubes.push(cube);
            }
        }

        // --- PENJANAAN SOALAN & LOGIK PERMAINAN ---
        function generateQuestion() {
            // Rawakkan operasi (+ atau -)
            const operation = Math.random() < 0.5 ? '+' : '-';
            let a, b, answer;

            // Tentukan had lingkungan nombor berdasarkan Tahap
            let maxVal = 10; // Tahap 2 (default)
            if (level === 1) {
                maxVal = 5;
            } else if (level === 3) {
                maxVal = 15;
            } else if (level >= 4) {
                maxVal = 20;
            }

            if (operation === '+') {
                answer = Math.floor(Math.random() * (maxVal + 1));
                a = Math.floor(Math.random() * (answer + 1));
                b = answer - a;
            } else {
                a = Math.floor(Math.random() * (maxVal + 1));
                b = Math.floor(Math.random() * (a + 1));
                answer = a - b;
            }

            currentQuestion = { a, b, op: operation, answer };

            // Paparkan soalan pada UI
            questionText.innerText = `${a} ${operation} ${b} = ?`;
            questionText.style.animation = 'none';
            // Paksa reflow untuk muat semula animasi
            questionText.offsetHeight; 
            questionText.style.animation = 'float-slow 4s ease-in-out infinite';

            // Jana pilihan jawapan (1 betul, 2 salah)
            const wrong1 = generateUniqueWrongAnswer(answer, maxVal);
            const wrong2 = generateUniqueWrongAnswer(answer, wrong1, maxVal);

            choices = [answer, wrong1, wrong2];
            
            // Rawakkan kedudukan pilihan jawapan
            shuffleArray(choices);

            // Kemas kini tekstur pada setiap kubus
            cubes.forEach((cube, i) => {
                cube.userData.value = choices[i];
                cube.userData.targetScale = 1.0; // reset skala
                
                // Laraskan kelajuan putaran kubus mengikut tahap
                const rotationFactor = 1 + (level - 1) * 0.15; // +15% kelajuan setiap tahap
                cube.userData.rotationSpeedX = (0.008 + (i * 0.002)) * rotationFactor;
                cube.userData.rotationSpeedY = (0.012 - (i * 0.001)) * rotationFactor;

                // Nyahaktifkan tekstur lama untuk cegah kebocoran memori
                if (cube.material.map) {
                    cube.material.map.dispose();
                }

                cube.material.map = createNumberTexture(choices[i], cubeColors[i], cubeTextColors[i]);
                cube.material.needsUpdate = true;
            });

            canClick = true;
        }

        function generateUniqueWrongAnswer(correct, existingWrong = -1, maxVal = 10) {
            let val;
            let attempts = 0;
            do {
                val = Math.floor(Math.random() * (maxVal + 1));
                attempts++;
            } while ((val === correct || val === existingWrong) && attempts < 100);
            return val;
        }

        // Pembantu untuk mengocok susunan array
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // --- PENGENDALI EVENT & INTERAKSI ---
        function onPointerDown(event) {
            if (!canClick) return;

            // Dapatkan koordinat normal peranti (-1 hingga 1)
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(cubes);

            if (intersects.length > 0) {
                const clickedCube = intersects[0].object;
                checkAnswer(clickedCube);
            }
        }

        function onPointerMove(event) {
            // Kesan Hover untuk ubah cursor
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(cubes);

            if (intersects.length > 0 && canClick) {
                document.body.style.cursor = 'pointer';
                // Besarkan sedikit kubus yang di-hover (kesan mikro-interaksi)
                const hovered = intersects[0].object;
                cubes.forEach(cube => {
                    if (cube === hovered && cube.userData.targetScale === 1.0) {
                        cube.userData.targetScale = 1.15;
                    } else if (cube !== hovered && cube.userData.targetScale === 1.15) {
                        cube.userData.targetScale = 1.0;
                    }
                });
            } else {
                document.body.style.cursor = 'default';
                cubes.forEach(cube => {
                    if (cube.userData.targetScale === 1.15) {
                        cube.userData.targetScale = 1.0;
                    }
                });
            }
        }

        function checkAnswer(selectedCube) {
            const chosenVal = selectedCube.userData.value;
            
            if (chosenVal === currentQuestion.answer) {
                // JAWAPAN BETUL
                canClick = false; // Anti-spam
                playCorrectSound();
                score += 10;
                updateScoreDisplay();
                checkLevelUp();

                // Animasi kubus betul membesar & berpusing laju
                selectedCube.userData.targetScale = 2.0;
                selectedCube.userData.rotationSpeedX *= 4;
                selectedCube.userData.rotationSpeedY *= 4;

                // Tunjukkan Maklum Balas Positif
                showFeedback(true);

                // Kembalikan kelajuan pusingan & jana soalan selepas sela masa 1.2 saat
                setTimeout(() => {
                    selectedCube.userData.rotationSpeedX /= 4;
                    selectedCube.userData.rotationSpeedY /= 4;
                    generateQuestion();
                }, 1200);

            } else {
                // JAWAPAN SALAH
                playIncorrectSound();
                if (score > 0) {
                    score = Math.max(0, score - 5);
                    updateScoreDisplay();
                }

                // Animasi kubus salah mengecil seketika
                selectedCube.userData.targetScale = 0.6;
                setTimeout(() => {
                    selectedCube.userData.targetScale = 1.0;
                }, 300);

                // Tunjukkan Maklum Balas Negatif
                showFeedback(false);
            }
        }

        function updateScoreDisplay() {
            scoreVal.innerText = score;
            scoreVal.style.transform = 'scale(1.3)';
            setTimeout(() => {
                scoreVal.style.transform = 'scale(1)';
            }, 200);
        }

        function checkLevelUp() {
            const targetLevel = Math.min(5, Math.floor(score / 50) + 1);
            if (targetLevel > level) {
                level = targetLevel;
                playLevelUpSound();
                triggerLevelUpVisuals();
            }
        }

        function playLevelUpSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            // Arpeggio C5 -> E5 -> G5 -> C6
            const freqs = [523.25, 659.25, 783.99, 1046.50];
            freqs.forEach((freq, idx) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, now + idx * 0.1);
                gain.gain.setValueAtTime(0.15, now + idx * 0.1);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + idx * 0.1 + 0.45);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + idx * 0.1);
                osc.stop(now + idx * 0.1 + 0.55);
            });
        }

        function triggerLevelUpVisuals() {
            // Kemas kini paparan tahap
            document.getElementById('level-val').innerText = level;
            
            const lvlVal = document.getElementById('level-val');
            lvlVal.style.transform = 'scale(1.6)';
            setTimeout(() => {
                lvlVal.style.transform = 'scale(1)';
            }, 300);

            // Papar Banner Naik Tahap
            const banner = document.getElementById('level-up-banner');
            banner.innerText = `TAHAP ${level}!`;
            banner.classList.add('level-up-active');
            setTimeout(() => {
                banner.classList.remove('level-up-active');
            }, 1600);

            // Kemas kini warna tema
            const themeIdx = Math.min(level - 1, levelThemes.length - 1);
            const theme = levelThemes[themeIdx];
            if (particles) {
                particles.material.color.setHex(theme.particleColor);
            }
            if (bottomLight) {
                bottomLight.color.setHex(theme.bottomLight);
            }

            // Putar kubus dengan kelajuan gila seketika
            cubes.forEach(cube => {
                cube.userData.rotationSpeedX *= 4;
                cube.userData.rotationSpeedY *= 4;
                setTimeout(() => {
                    const rotationFactor = 1 + (level - 1) * 0.15;
                    cube.userData.rotationSpeedX = (0.008 + (cube.userData.index * 0.002)) * rotationFactor;
                    cube.userData.rotationSpeedY = (0.012 - (cube.userData.index * 0.001)) * rotationFactor;
                }, 1200);
            });
        }

        function showFeedback(isCorrect) {
            let msg = "";
            feedbackText.className = 'feedback-text'; // clear classes

            if (isCorrect) {
                msg = positiveFeedbacks[Math.floor(Math.random() * positiveFeedbacks.length)];
                feedbackText.classList.add('feedback-active', 'feedback-correct');
            } else {
                msg = negativeFeedbacks[Math.floor(Math.random() * negativeFeedbacks.length)];
                feedbackText.classList.add('feedback-active', 'feedback-incorrect');
            }

            feedbackText.innerText = msg;

            // Sembunyikan maklum balas selepas sela masa tertentu
            setTimeout(() => {
                feedbackText.classList.remove('feedback-active');
            }, 1000);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);

            // Kawal kedudukan kubus agar tidak terkeluar dari skrin pada paparan telefon pintar
            if (window.innerWidth < 600) {
                cubes[0].position.x = -1.8;
                cubes[1].position.x = 0;
                cubes[2].position.x = 1.8;
                camera.position.z = 10;
            } else {
                cubes[0].position.x = cubeBaseX[0];
                cubes[1].position.x = cubeBaseX[1];
                cubes[2].position.x = cubeBaseX[2];
                camera.position.z = 8.5;
            }
        }

        // --- ANIMATION LOOP ---
        function animate(time) {
            requestAnimationFrame(animate);

            // Float & Rotate Cubes
            cubes.forEach((cube, i) => {
                // Putaran biasa
                cube.rotation.x += cube.userData.rotationSpeedX;
                cube.rotation.y += cube.userData.rotationSpeedY;

                // Kesan terapung (Bobbing effect) menggunakan gelombang sinus
                cube.position.y = Math.sin(time * 0.0018 + i) * 0.18;

                // Transisi Skala yang lancar (Smoothing scale with LERP)
                const currentScale = cube.scale.x;
                const target = cube.userData.targetScale;
                const newScale = THREE.MathUtils.lerp(currentScale, target, 0.1);
                cube.scale.set(newScale, newScale, newScale);
            });

            // Putar sistem zarah (background space) secara perlahan
            if (particles) {
                particles.rotation.y = time * 0.00005;
                particles.rotation.x = time * 0.00002;
            }

            renderer.render(scene, camera);
        }

        // --- MULAKAN GRAPHICS ---
        init3D();
        
        // Panggil penyelarasan saiz skrin pertama kali
        onWindowResize();

    </script>
</body>
